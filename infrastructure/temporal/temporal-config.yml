# temporal-config.yml
persistence:
  defaultStore: postgres
  visibilityStore: postgres
  datastores:
    postgres:
      sql:
        pluginName: postgres12
        databaseName: temporal
        connectAddr: axonbridge-postgres:5432
        connectProtocol: tcp
        user: axonbridge
        password: changeme_secure_password_here

global:
  membership:
    maxJoinDuration: 30s
  pprof:
    port: 7936

services:
  frontend:
    rpc:
      grpcPort: 7233
      membershipPort: 6933
      bindOnIP: "0.0.0.0"

  matching:
    rpc:
      grpcPort: 7235
      membershipPort: 6935
      bindOnIP: "0.0.0.0"

  history:
    rpc:
      grpcPort: 7234
      membershipPort: 6934
      bindOnIP: "0.0.0.0"

  worker:
    rpc:
      grpcPort: 7239
      membershipPort: 6939
      bindOnIP: "0.0.0.0"
